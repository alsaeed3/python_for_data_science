name: 42 Python Pre-flight Check

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        [cite_start]python-version: "3.10" # Strict subject requirement [cite: 25]

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # Add other dependencies here if needed for specific exercises

    - name: Lint with flake8 (Norminette)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. 42 is strict, so maybe remove exit-zero later!
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=80 --statistics
